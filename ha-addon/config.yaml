name: EnergyBrain
version: "0.3.1"
slug: energybrain
description: >
  Intelligent learning home energy management — coordinates PV, battery,
  heat pump and appliances to minimise grid import and capacity tariff.
url: https://github.com/DavidVH83/energybrain
arch:
  - aarch64
  - amd64
init: false
startup: application
boot: auto

# HA API access — supervisor token is injected automatically
homeassistant_api: true
auth_api: false
hassio_api: false

# No open ports; all communication goes through the supervisor
ingress: false
host_network: false
apparmor: true

# Persistent data (SQLite DB + logs)
map:
  - addon_config:rw

options:
  ha_url: "http://homeassistant:8123"
  ha_token: ""
  notification_device: ""
  marstek_write_enabled: false
  entsoe_api_key: ""
  static_import_price_eur_kwh: 0.25
  static_export_price_eur_kwh: 0.036
  capacity_tariff_eur_kw_year: 47.50
  latitude: 50.8597
  longitude: 4.7628
  timezone: "Europe/Brussels"
  log_level: "INFO"

schema:
  ha_url: url
  ha_token: str
  notification_device: str
  marstek_write_enabled: bool
  entsoe_api_key: str
  static_import_price_eur_kwh: float
  static_export_price_eur_kwh: float
  capacity_tariff_eur_kw_year: float
  latitude: float
  longitude: float
  timezone: str
  log_level: list(DEBUG|INFO|WARNING|ERROR)

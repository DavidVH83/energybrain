views:

  # ═══════════════════════════════════════════════════════════════════════════
  # TAB 1 — OVERZICHT
  # ═══════════════════════════════════════════════════════════════════════════
  - title: Overzicht
    icon: mdi:home-lightning-bolt
    path: overzicht
    cards:

      # ── Status banner ───────────────────────────────────────────────────────
      - type: markdown
        content: >
          ## 🧠 EnergyBrain

          **Status:** {{ states('input_text.energybrain_status') }}

          **Laatste actie:** {{ states('input_text.energybrain_last_action') }}

          **Vandaag:** {{ states('input_text.energybrain_today_plan') }}

          **Volgende:** {{ states('input_text.energybrain_next_action') }}

      # ── Live energiestroom ──────────────────────────────────────────────────
      - type: markdown
        title: "⚡ Energiestroom nu"
        content: >
          {{ states('input_text.energybrain_live_flow') }}

      # ── Live energie ────────────────────────────────────────────────────────
      - type: glance
        title: ⚡ Live energie
        show_name: true
        show_icon: true
        show_state: true
        entities:
          - entity: sensor.goodwe_pv_power
            name: Zonnepanelen
            icon: mdi:solar-power
          - entity: sensor.p1_meter_vermogen
            name: Net
            icon: mdi:transmission-tower
          - entity: sensor.marstek_venuse_state_of_charge
            name: Batterij %
            icon: mdi:battery
          - entity: sensor.marstek_venuse_power
            name: Batterij W
            icon: mdi:battery-charging
          - entity: sensor.smile_anna_buitentemperatuur
            name: Buiten
            icon: mdi:thermometer

      # ── Warmtepomp ──────────────────────────────────────────────────────────
      - type: thermostat
        entity: climate.anna
        name: Anna warmtepomp

      # ── Systeem aan/uit ─────────────────────────────────────────────────────
      - type: entities
        title: ⚙️ Systeem
        entities:
          - entity: input_boolean.energybrain_enabled
            name: EnergyBrain actief
          - entity: input_select.energybrain_mode
            name: Modus


  # ═══════════════════════════════════════════════════════════════════════════
  # TAB 2 — ENERGIE
  # ═══════════════════════════════════════════════════════════════════════════
  - title: Energie
    icon: mdi:lightning-bolt
    path: energie
    cards:

      # ── Energiestroom nu ────────────────────────────────────────────────────
      - type: markdown
        title: "⚡ Waar gaat de PV naartoe?"
        content: >
          {% set pv = states('sensor.goodwe_pv_power') | float(0) %}
          {% set bat = states('sensor.marstek_venuse_power') | float(0) %}
          {% set net = states('sensor.p1_meter_vermogen') | float(0) %}
          {% set house = [pv - bat + net, 0] | max %}
          {% set bat_charge = [bat, 0] | max %}
          {% set export = [(-net), 0] | max %}
          {% set import_w = [net, 0] | max %}

          | | Vermogen |
          |---|---|
          | ☀️ PV productie | **{{ pv | round }} W** |
          | 🔋 Batterij laadt | {{ bat_charge | round }} W |
          | 🏠 Huisverbruik | {{ house | round }} W |
          | 📤 Export naar net | {{ export | round }} W |
          | 📥 Import van net | {{ import_w | round }} W |
          | 🔋 SoC batterij | {{ states('sensor.marstek_venuse_state_of_charge') }}% |

      # ── Capaciteitstarief ───────────────────────────────────────────────────
      - type: markdown
        title: "📊 Capaciteitstarief"
        content: >
          {{ states('input_text.energybrain_capacity_current') or 'Nog geen data — wordt elke 5 min bijgewerkt.' }}

          ---
          {{ states('input_text.energybrain_capacity_peak') or '' }}

          *Het Belgisch capaciteitstarief is gebaseerd op het hoogste kwartiergemiddelde
          netafname per maand. Hoe lager de piek, hoe lager het tarief.*

      # ── PV & grid details ───────────────────────────────────────────────────
      - type: entities
        title: ☀️ PV & Net
        entities:
          - entity: sensor.goodwe_today_s_pv_generation
            name: PV vandaag (kWh)
            icon: mdi:solar-panel
          - entity: sensor.goodwe_pv_power
            name: PV vermogen (W)
            icon: mdi:solar-power
          - entity: sensor.p1_meter_vermogen
            name: Net vermogen (W)
            icon: mdi:transmission-tower
          - entity: sensor.p1_meter_energie_import
            name: Import vandaag (kWh)
            icon: mdi:home-import-outline
          - entity: sensor.p1_meter_energie_export
            name: Export vandaag (kWh)
            icon: mdi:home-export-outline

      # ── Batterij ────────────────────────────────────────────────────────────
      - type: entities
        title: 🔋 Batterij (Marstek VenusE)
        entities:
          - entity: sensor.marstek_venuse_state_of_charge
            name: Laadstand (%)
            icon: mdi:battery
          - entity: sensor.marstek_venuse_power
            name: Vermogen (W)
            icon: mdi:battery-charging
          - entity: sensor.marstek_venuse_battery_temperature
            name: Temperatuur
            icon: mdi:thermometer
          - entity: select.marstek_venuse_operating_mode
            name: Modus
            icon: mdi:battery-sync

      # ── Omvormer ────────────────────────────────────────────────────────────
      - type: entities
        title: 🔆 GoodWe omvormer
        entities:
          - entity: select.goodwe_bedrijfsmodus_omvormer
            name: Modus
            icon: mdi:solar-power-variant
          - entity: sensor.goodwe_pv_power
            name: PV vermogen (W)
            icon: mdi:solar-power
          - entity: sensor.goodwe_today_s_pv_generation
            name: Opbrengst vandaag (kWh)
            icon: mdi:chart-line


  # ═══════════════════════════════════════════════════════════════════════════
  # TAB 3 — TOESTELLEN
  # ═══════════════════════════════════════════════════════════════════════════
  - title: Toestellen
    icon: mdi:washing-machine
    path: toestellen
    cards:

      # ── Vaatwasser ──────────────────────────────────────────────────────────
      - type: entities
        title: 🍽️ Vaatwasser
        entities:
          - entity: sensor.vaatwasser_status
            name: Status
            icon: mdi:dishwasher
          - entity: binary_sensor.vaatwasser_start_op_afstand
            name: Klaar voor start op afstand
            icon: mdi:remote

      # ── Wasmachine ──────────────────────────────────────────────────────────
      - type: entities
        title: 👕 Wasmachine
        entities:
          - entity: sensor.wasmachine_status
            name: Status
            icon: mdi:washing-machine
          - entity: binary_sensor.wasmachine_start_op_afstand
            name: Klaar voor start op afstand
            icon: mdi:remote

      # ── Droger ──────────────────────────────────────────────────────────────
      - type: entities
        title: 💨 Droger
        entities:
          - entity: sensor.droger_status
            name: Status
            icon: mdi:tumble-dryer
          - entity: binary_sensor.droger_start_op_afstand
            name: Klaar voor start op afstand
            icon: mdi:remote

      # ── Boiler ──────────────────────────────────────────────────────────────
      - type: entities
        title: 🚿 Warm water
        entities:
          - entity: sensor.opentherm_sww_temperatuur
            name: Boilertemperatuur
            icon: mdi:water-boiler
          - entity: input_number.energybrain_dhw_target_temp
            name: Doeltemperatuur (°C)
          - entity: input_boolean.energybrain_dhw_boost_now
            name: Nu boosten


  # ═══════════════════════════════════════════════════════════════════════════
  # TAB 4 — INSTELLINGEN
  # ═══════════════════════════════════════════════════════════════════════════
  - title: Instellingen
    icon: mdi:cog
    path: instellingen
    cards:

      # ── Temperatuur override ────────────────────────────────────────────────
      - type: vertical-stack
        cards:
          - type: entities
            title: 🌡️ Temperatuur override
            entities:
              - entity: input_boolean.energybrain_hvac_override_active
                name: Override actief
              - entity: input_number.energybrain_hvac_override_setpoint
                name: Gewenste temperatuur (°C)
              - entity: input_number.energybrain_hvac_override_duration_h
                name: Duur (uur)
              - entity: input_datetime.energybrain_hvac_override_expires
                name: Actief tot

          - type: conditional
            conditions:
              - entity: input_boolean.energybrain_hvac_override_active
                state: "on"
            card:
              type: markdown
              content: >
                ✅ **Override actief:
                {{ states('input_number.energybrain_hvac_override_setpoint') }}°C
                tot {{ states('input_datetime.energybrain_hvac_override_expires') | as_timestamp(default=0) | timestamp_custom('%H:%M') }}**

                EnergyBrain past de temperatuur niet aan tot de override verloopt.

      # ── Feest / gasten modus ────────────────────────────────────────────────
      - type: vertical-stack
        cards:
          - type: entities
            title: 🎉 Feest / Gasten
            entities:
              - entity: input_boolean.energybrain_party_mode
                name: Feest modus
              - entity: input_number.energybrain_party_temp_offset
                name: Temperatuur extra (°C)
              - entity: input_number.energybrain_party_duration_h
                name: Duur (uur)
              - entity: input_boolean.energybrain_party_extra_cooking
                name: Meer koken verwacht
              - entity: input_number.energybrain_party_dishwasher_runs
                name: Vaatwasser beurten
              - entity: input_datetime.energybrain_party_expires
                name: Actief tot

          - type: conditional
            conditions:
              - entity: input_boolean.energybrain_party_mode
                state: "on"
            card:
              type: markdown
              content: >
                🎉 **Feest modus actief tot
                {{ states('input_datetime.energybrain_party_expires') | as_timestamp(default=0) | timestamp_custom('%H:%M') }}**

                Temperatuur +{{ states('input_number.energybrain_party_temp_offset') }}°C |
                Vaatwasser {{ states('input_number.energybrain_party_dishwasher_runs') | int }}×

      # ── Vakantie modus ──────────────────────────────────────────────────────
      - type: entities
        title: 🏖️ Vakantie
        entities:
          - entity: input_boolean.energybrain_vacation_mode
            name: Vakantie modus
          - entity: input_datetime.energybrain_vacation_start
            name: Vertrekdatum
          - entity: input_datetime.energybrain_vacation_end
            name: Terugkeerdatum

      # ── Systeem info ────────────────────────────────────────────────────────
      - type: entities
        title: 🔧 Systeem info
        entities:
          - entity: input_boolean.energybrain_enabled
            name: EnergyBrain actief
          - entity: input_select.energybrain_mode
            name: Modus
          - entity: input_text.energybrain_override_reason
            name: Override reden


  # ═══════════════════════════════════════════════════════════════════════════
  # TAB 5 — DAGPLAN
  # ═══════════════════════════════════════════════════════════════════════════
  - title: Dagplan
    icon: mdi:calendar-clock
    path: dagplan
    cards:

      # ── Live energiestroom (volledig) ───────────────────────────────────────
      - type: markdown
        title: "⚡ Energiestroom nu"
        content: >
          {{ states('input_text.energybrain_live_flow') or 'Geen data — add-on nog niet gestart.' }}

          ---
          {% set pv = states('sensor.goodwe_pv_power') | float(0) %}
          {% set bat = states('sensor.marstek_venuse_power') | float(0) %}
          {% set net = states('sensor.p1_meter_vermogen') | float(0) %}
          {% set soc = states('sensor.marstek_venuse_state_of_charge') | float(0) %}
          {% set house = [pv - bat + net, 0] | max %}

          ☀️ **{{ pv | round }}W** →
          🔋 **{{ bat | round }}W** bat ({{ soc | round }}%) ·
          🏠 **{{ house | round }}W** huis ·
          {{ '📤' if net < 0 else '📥' }} **{{ net | abs | round }}W** {{ 'export' if net < 0 else 'import' }}

          *PV vandaag: {{ states('sensor.goodwe_today_s_pv_generation') }} kWh · Boiler: {{ states('sensor.opentherm_sww_temperatuur') }}°C*

      # ── PV forecast & surplus vensters ──────────────────────────────────────
      - type: markdown
        title: ☀️ Zonne-energie vandaag
        content: >
          {{ states('input_text.energybrain_plan_summary') or 'Dagplan wordt aangemaakt om 06:30.' }}

      # ── Geplande taken ──────────────────────────────────────────────────────
      - type: markdown
        title: 📋 Geplande taken
        content: >
          {{ states('input_text.energybrain_today_plan') }}


          **Volgende:** {{ states('input_text.energybrain_next_action') }}

      # ── Wat is er uitgevoerd ────────────────────────────────────────────────
      - type: markdown
        title: ✅ Uitgevoerd vandaag
        content: >
          {{ states('input_text.energybrain_executed_today') }}

      # ── Laatste actie ───────────────────────────────────────────────────────
      - type: markdown
        title: 🕐 Laatste actie
        content: >
          {{ states('input_text.energybrain_last_action') }}

      # ── Live staat toestellen ───────────────────────────────────────────────
      - type: glance
        title: 🏠 Toestellen nu
        show_name: true
        show_icon: true
        show_state: true
        entities:
          - entity: sensor.vaatwasser_status
            name: Vaatwasser
            icon: mdi:dishwasher
          - entity: sensor.wasmachine_status
            name: Wasmachine
            icon: mdi:washing-machine
          - entity: sensor.droger_status
            name: Droger
            icon: mdi:tumble-dryer
          - entity: sensor.opentherm_sww_temperatuur
            name: Boiler
            icon: mdi:water-boiler
          - entity: sensor.goodwe_pv_power
            name: PV nu
            icon: mdi:solar-power


  # ═══════════════════════════════════════════════════════════════════════════
  # TAB 6 — STATISTIEKEN
  # ═══════════════════════════════════════════════════════════════════════════
  - title: Statistieken
    icon: mdi:chart-bar
    path: statistieken
    cards:

      # ── Vandaag samenvatting ─────────────────────────────────────────────────
      - type: markdown
        title: "📊 Vandaag"
        content: >
          {{ states('input_text.energybrain_stats_today') or 'Statistieken beschikbaar na 22:00.' }}

      # ── Financieel vandaag ──────────────────────────────────────────────────
      - type: markdown
        title: "💶 Financieel (vandaag)"
        content: >
          {{ states('input_text.energybrain_stats_financial') or 'Financieel overzicht beschikbaar na 22:00.' }}

          ---
          *Berekening: zelfverbruik PV × importtarief + export × exporttarief.*

      # ── Week statistieken ───────────────────────────────────────────────────
      - type: markdown
        title: "📅 Deze week (netmeter)"
        content: >
          {% set imp_w = states('sensor.energybrain_import_wekelijks') | float(0) %}
          {% set exp_w = states('sensor.energybrain_export_wekelijks') | float(0) %}

          | | kWh | Financieel |
          |---|---|---|
          | 📥 Import (net) | {{ imp_w | round(2) }} kWh | {{ (imp_w * 0.25) | round(2) }} € kosten |
          | 📤 Export (net) | {{ exp_w | round(2) }} kWh | +{{ (exp_w * 0.036) | round(2) }} € |
          | 💶 Netto | — | {{ ((exp_w * 0.036) - (imp_w * 0.25)) | round(2) }} € |

          *Weekmeter start te tellen vanaf installatie van v0.3.8.*

      # ── Maand statistieken ──────────────────────────────────────────────────
      - type: markdown
        title: "📆 Deze maand (netmeter)"
        content: >
          {% set imp_m = states('sensor.energybrain_import_maandelijks') | float(0) %}
          {% set exp_m = states('sensor.energybrain_export_maandelijks') | float(0) %}
          {% set export_inc = exp_m * 0.036 %}
          {% set import_cost = imp_m * 0.25 %}

          | | kWh | Financieel |
          |---|---|---|
          | 📥 Import | {{ imp_m | round(2) }} kWh | {{ import_cost | round(2) }} € kosten |
          | 📤 Export | {{ exp_m | round(2) }} kWh | +{{ export_inc | round(2) }} € |
          | 💶 Nettoresultaat | — | {{ (export_inc - import_cost) | round(2) }} € |

          *Maandmeter reset elke 1e van de maand.*

      # ── Jaar statistieken ───────────────────────────────────────────────────
      - type: markdown
        title: "📈 Dit jaar (netmeter)"
        content: >
          {% set imp_y = states('sensor.energybrain_import_jaarlijks') | float(0) %}
          {% set exp_y = states('sensor.energybrain_export_jaarlijks') | float(0) %}

          | | kWh | Financieel |
          |---|---|---|
          | 📥 Import | {{ imp_y | round(1) }} kWh | {{ (imp_y * 0.25) | round(2) }} € |
          | 📤 Export | {{ exp_y | round(1) }} kWh | +{{ (exp_y * 0.036) | round(2) }} € |
          | 💶 Nettoresultaat | — | {{ ((exp_y * 0.036) - (imp_y * 0.25)) | round(2) }} € |

          *Jaarmeter reset elk jaar op 1 januari.*

      # ── Capaciteitstarief historiek ─────────────────────────────────────────
      - type: markdown
        title: "📊 Capaciteitstarief — live"
        content: >
          {{ states('input_text.energybrain_capacity_current') or 'Nog geen kwartierdata.' }}

          ---
          {{ states('input_text.energybrain_capacity_peak') or '' }}

          ---
          **Hoe werkt het?**
          Het Belgische capaciteitstarief wordt bepaald door het hoogste 15-minuten
          gemiddelde netafname per maand. EnergyBrain bewaakt dit live en waarschuwt
          wanneer een nieuwe maandpiek dreigt.

      # ── Live glance ─────────────────────────────────────────────────────────
      - type: glance
        title: "⚡ Live nu"
        show_name: true
        show_icon: true
        show_state: true
        entities:
          - entity: sensor.goodwe_pv_power
            name: PV (W)
            icon: mdi:solar-power
          - entity: sensor.p1_meter_vermogen
            name: Net (W)
            icon: mdi:transmission-tower
          - entity: sensor.marstek_venuse_power
            name: Batterij (W)
            icon: mdi:battery-charging
          - entity: sensor.goodwe_today_s_pv_generation
            name: PV vandaag
            icon: mdi:solar-panel
          - entity: sensor.marstek_venuse_state_of_charge
            name: SoC
            icon: mdi:battery

views:

  # ═══════════════════════════════════════════════════════════════════════════
  # TAB 1 — OVERZICHT
  # ═══════════════════════════════════════════════════════════════════════════
  - title: Overzicht
    icon: mdi:home-lightning-bolt
    path: overzicht
    cards:

      # ── Status banner ───────────────────────────────────────────────────────
      - type: markdown
        content: >
          ## 🧠 EnergyBrain

          **Status:** {{ states('input_text.energybrain_status') }}

          **Laatste actie:** {{ states('input_text.energybrain_last_action') }}

          **Vandaag:** {{ states('input_text.energybrain_today_plan') }}

          **Volgende:** {{ states('input_text.energybrain_next_action') }}

      # ── Live energie ────────────────────────────────────────────────────────
      - type: glance
        title: ⚡ Live energie
        show_name: true
        show_icon: true
        show_state: true
        entities:
          - entity: sensor.goodwe_pv_power
            name: Zonnepanelen
            icon: mdi:solar-power
          - entity: sensor.p1_meter_vermogen
            name: Net
            icon: mdi:transmission-tower
          - entity: sensor.marstek_venuse_state_of_charge
            name: Batterij %
            icon: mdi:battery
          - entity: sensor.marstek_venuse_power
            name: Batterij W
            icon: mdi:battery-charging
          - entity: sensor.smile_anna_buitentemperatuur
            name: Buiten
            icon: mdi:thermometer

      # ── Warmtepomp ──────────────────────────────────────────────────────────
      - type: thermostat
        entity: climate.anna
        name: Anna warmtepomp

      # ── Systeem aan/uit ─────────────────────────────────────────────────────
      - type: entities
        title: ⚙️ Systeem
        entities:
          - entity: input_boolean.energybrain_enabled
            name: EnergyBrain actief
          - entity: input_select.energybrain_mode
            name: Modus


  # ═══════════════════════════════════════════════════════════════════════════
  # TAB 2 — ENERGIE
  # ═══════════════════════════════════════════════════════════════════════════
  - title: Energie
    icon: mdi:lightning-bolt
    path: energie
    cards:

      # ── PV & grid details ───────────────────────────────────────────────────
      - type: entities
        title: ☀️ PV & Net
        entities:
          - entity: sensor.goodwe_today_s_pv_generation
            name: PV vandaag (kWh)
            icon: mdi:solar-panel
          - entity: sensor.goodwe_pv_power
            name: PV vermogen (W)
            icon: mdi:solar-power
          - entity: sensor.p1_meter_vermogen
            name: Net vermogen (W)
            icon: mdi:transmission-tower
          - entity: sensor.p1_meter_energie_import
            name: Import vandaag (kWh)
            icon: mdi:home-import-outline
          - entity: sensor.p1_meter_energie_export
            name: Export vandaag (kWh)
            icon: mdi:home-export-outline

      # ── Batterij ────────────────────────────────────────────────────────────
      - type: entities
        title: 🔋 Batterij (Marstek VenusE)
        entities:
          - entity: sensor.marstek_venuse_state_of_charge
            name: Laadstand (%)
            icon: mdi:battery
          - entity: sensor.marstek_venuse_power
            name: Vermogen (W)
            icon: mdi:battery-charging
          - entity: sensor.marstek_venuse_battery_temperature
            name: Temperatuur
            icon: mdi:thermometer
          - entity: select.marstek_venuse_operating_mode
            name: Modus
            icon: mdi:battery-sync

      # ── Omvormer ────────────────────────────────────────────────────────────
      - type: entities
        title: 🔆 GoodWe omvormer
        entities:
          - entity: select.goodwe_bedrijfsmodus_omvormer
            name: Modus
            icon: mdi:solar-power-variant
          - entity: sensor.goodwe_pv_power
            name: PV vermogen (W)
            icon: mdi:solar-power
          - entity: sensor.goodwe_today_s_pv_generation
            name: Opbrengst vandaag (kWh)
            icon: mdi:chart-line


  # ═══════════════════════════════════════════════════════════════════════════
  # TAB 3 — TOESTELLEN
  # ═══════════════════════════════════════════════════════════════════════════
  - title: Toestellen
    icon: mdi:washing-machine
    path: toestellen
    cards:

      # ── Vaatwasser ──────────────────────────────────────────────────────────
      - type: entities
        title: 🍽️ Vaatwasser
        entities:
          - entity: sensor.vaatwasser_status
            name: Status
            icon: mdi:dishwasher
          - entity: binary_sensor.vaatwasser_start_op_afstand
            name: Klaar voor start op afstand
            icon: mdi:remote

      # ── Wasmachine ──────────────────────────────────────────────────────────
      - type: entities
        title: 👕 Wasmachine
        entities:
          - entity: sensor.wasmachine_status
            name: Status
            icon: mdi:washing-machine
          - entity: binary_sensor.wasmachine_start_op_afstand
            name: Klaar voor start op afstand
            icon: mdi:remote

      # ── Droger ──────────────────────────────────────────────────────────────
      - type: entities
        title: 💨 Droger
        entities:
          - entity: sensor.droger_status
            name: Status
            icon: mdi:tumble-dryer
          - entity: binary_sensor.droger_start_op_afstand
            name: Klaar voor start op afstand
            icon: mdi:remote

      # ── Boiler ──────────────────────────────────────────────────────────────
      - type: entities
        title: 🚿 Warm water
        entities:
          - entity: sensor.opentherm_sww_temperatuur
            name: Boilertemperatuur
            icon: mdi:water-boiler
          - entity: input_number.energybrain_dhw_target_temp
            name: Doeltemperatuur (°C)
          - entity: input_boolean.energybrain_dhw_boost_now
            name: Nu boosten


  # ═══════════════════════════════════════════════════════════════════════════
  # TAB 4 — INSTELLINGEN
  # ═══════════════════════════════════════════════════════════════════════════
  - title: Instellingen
    icon: mdi:cog
    path: instellingen
    cards:

      # ── Temperatuur override ────────────────────────────────────────────────
      - type: vertical-stack
        cards:
          - type: entities
            title: 🌡️ Temperatuur override
            entities:
              - entity: input_boolean.energybrain_hvac_override_active
                name: Override actief
              - entity: input_number.energybrain_hvac_override_setpoint
                name: Gewenste temperatuur (°C)
              - entity: input_number.energybrain_hvac_override_duration_h
                name: Duur (uur)
              - entity: input_datetime.energybrain_hvac_override_expires
                name: Actief tot

          - type: conditional
            conditions:
              - entity: input_boolean.energybrain_hvac_override_active
                state: "on"
            card:
              type: markdown
              content: >
                ✅ **Override actief:
                {{ states('input_number.energybrain_hvac_override_setpoint') }}°C
                tot {{ states('input_datetime.energybrain_hvac_override_expires') | as_timestamp(default=0) | timestamp_custom('%H:%M') }}**

                EnergyBrain past de temperatuur niet aan tot de override verloopt.

      # ── Feest / gasten modus ────────────────────────────────────────────────
      - type: vertical-stack
        cards:
          - type: entities
            title: 🎉 Feest / Gasten
            entities:
              - entity: input_boolean.energybrain_party_mode
                name: Feest modus
              - entity: input_number.energybrain_party_temp_offset
                name: Temperatuur extra (°C)
              - entity: input_number.energybrain_party_duration_h
                name: Duur (uur)
              - entity: input_boolean.energybrain_party_extra_cooking
                name: Meer koken verwacht
              - entity: input_number.energybrain_party_dishwasher_runs
                name: Vaatwasser beurten
              - entity: input_datetime.energybrain_party_expires
                name: Actief tot

          - type: conditional
            conditions:
              - entity: input_boolean.energybrain_party_mode
                state: "on"
            card:
              type: markdown
              content: >
                🎉 **Feest modus actief tot
                {{ states('input_datetime.energybrain_party_expires') | as_timestamp(default=0) | timestamp_custom('%H:%M') }}**

                Temperatuur +{{ states('input_number.energybrain_party_temp_offset') }}°C |
                Vaatwasser {{ states('input_number.energybrain_party_dishwasher_runs') | int }}×

      # ── Vakantie modus ──────────────────────────────────────────────────────
      - type: entities
        title: 🏖️ Vakantie
        entities:
          - entity: input_boolean.energybrain_vacation_mode
            name: Vakantie modus
          - entity: input_datetime.energybrain_vacation_start
            name: Vertrekdatum
          - entity: input_datetime.energybrain_vacation_end
            name: Terugkeerdatum

      # ── Systeem info ────────────────────────────────────────────────────────
      - type: entities
        title: 🔧 Systeem info
        entities:
          - entity: input_boolean.energybrain_enabled
            name: EnergyBrain actief
          - entity: input_select.energybrain_mode
            name: Modus
          - entity: input_text.energybrain_override_reason
            name: Override reden


  # ═══════════════════════════════════════════════════════════════════════════
  # TAB 5 — DAGPLAN
  # ═══════════════════════════════════════════════════════════════════════════
  - title: Dagplan
    icon: mdi:calendar-clock
    path: dagplan
    cards:

      # ── PV forecast & surplus vensters ──────────────────────────────────────
      - type: markdown
        title: ☀️ Zonne-energie vandaag
        content: >
          {{ states('input_text.energybrain_plan_summary') }}

      # ── Geplande taken ──────────────────────────────────────────────────────
      - type: markdown
        title: 📋 Geplande taken
        content: >
          {{ states('input_text.energybrain_today_plan') }}


          **Volgende:** {{ states('input_text.energybrain_next_action') }}

      # ── Wat is er uitgevoerd ────────────────────────────────────────────────
      - type: markdown
        title: ✅ Uitgevoerd vandaag
        content: >
          {{ states('input_text.energybrain_executed_today') }}

      # ── Laatste actie ───────────────────────────────────────────────────────
      - type: markdown
        title: 🕐 Laatste actie
        content: >
          {{ states('input_text.energybrain_last_action') }}

      # ── Live staat toestellen ───────────────────────────────────────────────
      - type: glance
        title: 🏠 Toestellen nu
        show_name: true
        show_icon: true
        show_state: true
        entities:
          - entity: sensor.vaatwasser_status
            name: Vaatwasser
            icon: mdi:dishwasher
          - entity: sensor.wasmachine_status
            name: Wasmachine
            icon: mdi:washing-machine
          - entity: sensor.droger_status
            name: Droger
            icon: mdi:tumble-dryer
          - entity: sensor.opentherm_sww_temperatuur
            name: Boiler
            icon: mdi:water-boiler
          - entity: sensor.goodwe_pv_power
            name: PV nu
            icon: mdi:solar-power
